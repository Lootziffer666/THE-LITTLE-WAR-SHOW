<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oculus II | Kuwait</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        :root {
            --font-main: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            --glass: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent: #0a84ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: var(--font-main);
            color: var(--text-primary);
        }

        /* 3D Layer */
        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            transition: opacity 2s ease;
            opacity: 0;
        }

        /* Vignette */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        /* UI Layer */
        .ui-layer {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
            box-sizing: border-box;
            pointer-events: none;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .location-tag {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .city-name {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        .status-dot {
            width: 6px; height: 6px; background: #32d74b; border-radius: 50%;
            box-shadow: 0 0 10px #32d74b;
            animation: pulse 2s infinite;
        }

        /* Main Display */
        .hero-section {
            text-align: center;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -60%);
            width: 100%;
        }

        .temperature {
            font-size: clamp(5rem, 15vw, 12rem);
            font-weight: 200;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(180deg, #fff, rgba(255,255,255,0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.3));
        }

        .condition-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 1rem;
            font-size: 1.5rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.8;
        }

        /* Bottom Dashboard */
        .dashboard {
            pointer-events: auto;
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            gap: 2rem;
            align-items: center;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            transform: translateY(100px);
            opacity: 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .separator { width: 1px; height: 50px; background: rgba(255,255,255,0.1); }

        .details-grid {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .detail-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-value { font-size: 1.1rem; font-weight: 500; }

        .forecast-strip {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .forecast-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        /* Utility */
        .hidden { display: none; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        /* Mobile */
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; gap: 1.5rem; padding: 1.5rem; }
            .separator { display: none; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="vignette"></div>

    <div class="ui-layer">
        <header>
            <div class="location-tag">
                <i data-lucide="map-pin" size="18"></i>
                <div class="city-name">Salmiya, Kuwait</div>
            </div>
            <div class="live-badge">
                <div class="status-dot"></div>
                <span>LIVE FEED</span>
            </div>
        </header>

        <section class="hero-section">
            <div class="temperature" id="temp">--°</div>
            <div class="condition-wrapper">
                <i id="main-icon" data-lucide="loader-2" class="spin"></i>
                <span id="condition">INITIALIZING</span>
            </div>
        </section>

        <div class="dashboard" id="dashboard">
            <div class="details-grid">
                <div class="detail-item">
                    <span class="detail-label"><i data-lucide="wind" size="14"></i> Wind</span>
                    <span class="detail-value" id="wind">-- km/h</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label"><i data-lucide="droplets" size="14"></i> Humidity</span>
                    <span class="detail-value" id="humidity">--%</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label"><i data-lucide="eye" size="14"></i> Visibility</span>
                    <span class="detail-value" id="visibility">-- km</span>
                </div>
            </div>

            <div class="separator"></div>

            <div class="forecast-strip" id="forecast-strip">
                </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURATION ---
        const CONFIG = {
            lat: 29.3343, // Salmiya
            lon: 48.0760,
            timezone: 'Asia/Kuwait'
        };

        // --- ASSET FACTORY (In-Memory Textures) ---
        // Generates textures similar to 'threejs-weather' assets
        const TextureFactory = {
            createCloud() {
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                const grad = ctx.createRadialGradient(32,32,0, 32,32,32);
                grad.addColorStop(0, 'rgba(255,255,255,0.9)');
                grad.addColorStop(0.4, 'rgba(255,255,255,0.3)');
                grad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0,0,64,64);
                return new THREE.CanvasTexture(canvas);
            },
            createRain() {
                const canvas = document.createElement('canvas');
                canvas.width = 32; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#abc'; // Blue-ish tint
                ctx.fillRect(14, 0, 4, 64);
                return new THREE.CanvasTexture(canvas);
            },
            createSnow() {
                const canvas = document.createElement('canvas');
                canvas.width = 32; canvas.height = 32;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(16,16,10,0,Math.PI*2);
                ctx.fill();
                return new THREE.CanvasTexture(canvas);
            }
        };

        // --- 3D ENGINE ---
        class WeatherStage {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x000000, 0.002);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.camera.position.z = 50;

                this.renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.container.appendChild(this.renderer.domElement);

                // Lighting
                this.ambient = new THREE.AmbientLight(0xffffff, 0.5);
                this.scene.add(this.ambient);
                
                this.sun = new THREE.DirectionalLight(0xffffff, 1);
                this.sun.position.set(10, 20, 10);
                this.scene.add(this.sun);

                // Sky
                this.createSky();

                // Mouse interaction
                this.mouseX = 0;
                this.mouseY = 0;
                document.addEventListener('mousemove', (e) => {
                    this.mouseX = (e.clientX - window.innerWidth/2) * 0.001;
                    this.mouseY = (e.clientY - window.innerHeight/2) * 0.001;
                });

                window.addEventListener('resize', () => this.resize());
                
                this.clock = new THREE.Clock();
                this.clouds = [];
                this.particles = null;

                this.animate();
            }

            createSky() {
                const geom = new THREE.SphereGeometry(400, 32, 32);
                const mat = new THREE.MeshBasicMaterial({ color: 0x050505, side: THREE.BackSide });
                this.skyDome = new THREE.Mesh(geom, mat);
                this.scene.add(this.skyDome);
            }

            updateWeather(code, isDay) {
                // Clear existing
                if(this.particles) { this.scene.remove(this.particles); this.particles = null; }
                this.clouds.forEach(c => this.scene.remove(c));
                this.clouds = [];

                // 1. Color Palette
                let skyColor = isDay ? 0x2462e0 : 0x0a0f1c; // Salmiya Day Blue / Night Dark
                let cloudOpacity = 0.5;

                if (code > 2) skyColor = isDay ? 0x8899ac : 0x1c2230; // Cloudy
                if (code >= 50) skyColor = 0x2a303c; // Rain/Storm
                if (code == 0 && !isDay) skyColor = 0x020205; // Clear Night

                gsap.to(this.skyDome.material.color, { r: new THREE.Color(skyColor).r, g: new THREE.Color(skyColor).g, b: new THREE.Color(skyColor).b, duration: 2 });
                this.scene.fog.color.setHex(skyColor);

                // 2. Clouds
                if (code > 0) {
                    const count = code > 50 ? 50 : 20;
                    const tex = TextureFactory.createCloud();
                    const mat = new THREE.SpriteMaterial({ map: tex, color: 0xffffff, opacity: cloudOpacity, transparent: true });
                    
                    for(let i=0; i<count; i++) {
                        const cloud = new THREE.Sprite(mat);
                        cloud.scale.set(40, 40, 1);
                        cloud.position.set((Math.random()-0.5)*200, (Math.random()*40)-10, (Math.random()-0.5)*100);
                        this.clouds.push(cloud);
                        this.scene.add(cloud);
                    }
                }

                // 3. Precip
                if (code >= 51 && code <= 67) this.createPrecip('rain'); // Rain
                else if (code >= 71) this.createPrecip('snow'); // Snow
                else if (code == 0 && !isDay) this.createStars(); // Stars
            }

            createPrecip(type) {
                const count = 3000;
                const geom = new THREE.BufferGeometry();
                const pos = new Float32Array(count * 3);
                const vels = new Float32Array(count);

                for(let i=0; i<count; i++) {
                    pos[i*3] = (Math.random()-0.5)*200;
                    pos[i*3+1] = (Math.random()-0.5)*200;
                    pos[i*3+2] = (Math.random()-0.5)*100;
                    vels[i] = (Math.random() * 0.5) + 0.5;
                }

                geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                
                const tex = type === 'rain' ? TextureFactory.createRain() : TextureFactory.createSnow();
                const mat = new THREE.PointsMaterial({ 
                    map: tex, 
                    size: type === 'rain' ? 2 : 1, 
                    transparent: true, 
                    opacity: 0.8, 
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                this.particles = new THREE.Points(geom, mat);
                this.particles.userData = { type: type, vels: vels };
                this.scene.add(this.particles);
            }

            createStars() {
                const geom = new THREE.BufferGeometry();
                const count = 1000;
                const pos = new Float32Array(count*3);
                for(let i=0; i<count*3; i++) pos[i] = (Math.random()-0.5)*300;
                geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true });
                this.particles = new THREE.Points(geom, mat);
                this.particles.userData = { type: 'stars' };
                this.scene.add(this.particles);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const time = this.clock.getElapsedTime();

                // Parallax
                this.camera.position.x += (this.mouseX * 10 - this.camera.position.x) * 0.05;
                this.camera.position.y += (-this.mouseY * 10 - this.camera.position.y) * 0.05;
                this.camera.lookAt(0,0,0);

                // Cloud drift
                this.clouds.forEach((c, i) => {
                    c.position.x += 0.02;
                    if(c.position.x > 100) c.position.x = -100;
                });

                // Particle Fall
                if(this.particles && this.particles.userData.type !== 'stars') {
                    const pos = this.particles.geometry.attributes.position.array;
                    const vels = this.particles.userData.vels;
                    for(let i=0; i<pos.length/3; i++) {
                        pos[i*3+1] -= vels[i];
                        if(pos[i*3+1] < -50) pos[i*3+1] = 50;
                    }
                    this.particles.geometry.attributes.position.needsUpdate = true;
                }

                this.renderer.render(this.scene, this.camera);
            }

            resize() {
                this.camera.aspect = window.innerWidth/window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        // --- APP LOGIC ---
        const App = {
            async init() {
                const stage = new WeatherStage();
                
                try {
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.lat}&longitude=${CONFIG.lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&hourly=relativehumidity_2m,visibility,windspeed_10m&timezone=auto`;
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    this.updateUI(data);
                    stage.updateWeather(data.current_weather.weathercode, data.current_weather.is_day);
                    
                    // Reveal
                    document.getElementById('canvas-container').style.opacity = 1;
                    gsap.to('#dashboard', { opacity: 1, y: 0, duration: 1, ease: 'power3.out', delay: 0.5 });

                } catch(e) {
                    console.error(e);
                    document.getElementById('condition').innerText = "OFFLINE MODE";
                }
            },

            updateUI(data) {
                const current = data.current_weather;
                const daily = data.daily;
                const hourly = data.hourly;

                // 1. Icons Map (Lucide)
                const getIcon = (code) => {
                    if (code === 0) return 'sun';
                    if (code < 3) return 'cloud-sun';
                    if (code < 50) return 'cloud';
                    if (code < 60) return 'cloud-drizzle';
                    if (code < 70) return 'cloud-rain';
                    if (code < 80) return 'snowflake';
                    return 'cloud-lightning';
                };

                // 2. Main Text
                document.getElementById('temp').innerText = Math.round(current.temperature) + "°";
                document.getElementById('condition').innerText = this.getLabel(current.weathercode);
                
                // Set Lucide attribute and refresh
                const mainIcon = document.getElementById('main-icon');
                mainIcon.setAttribute('data-lucide', getIcon(current.weathercode));
                mainIcon.classList.remove('spin'); // Stop loader spin

                // 3. Details
                document.getElementById('wind').innerText = current.windspeed + " km/h";
                document.getElementById('humidity').innerText = hourly.relativehumidity_2m[0] + "%";
                document.getElementById('visibility').innerText = (hourly.visibility[0] / 1000).toFixed(1) + " km";

                // 4. Forecast
                const strip = document.getElementById('forecast-strip');
                strip.innerHTML = '';
                for(let i=1; i<=4; i++) {
                    const day = new Date(daily.time[i]).toLocaleDateString('en-US', {weekday: 'short'});
                    const icon = getIcon(daily.weathercode[i]);
                    const max = Math.round(daily.temperature_2m_max[i]);
                    
                    const el = document.createElement('div');
                    el.className = 'forecast-day';
                    el.innerHTML = `
                        <span>${day}</span>
                        <i data-lucide="${icon}" size="20"></i>
                        <span>${max}°</span>
                    `;
                    strip.appendChild(el);
                }

                // Re-render Icons
                lucide.createIcons();
            },

            getLabel(code) {
                const map = { 0: "Clear", 1: "Fair", 2: "Cloudy", 3: "Overcast", 61: "Rain", 71: "Snow", 95: "Storm" };
                return map[code] || "Variable";
            }
        };

        App.init();
    </script>
</body>
</html>
